<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>KABUKAN</title><style>*{box-sizing:border-box}body{background:#f5f5f5;color:#333;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:20px;margin:0}h1{color:#e74c3c;text-align:center;margin-bottom:20px;border-bottom:3px solid #ecf0f1;padding-bottom:15px}.tabs{display:flex;justify-content:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}.tab{padding:10px 20px;background:#fff;border:2px solid #d5dbdb;border-radius:6px;cursor:pointer;font-size:14px;color:#333;transition:all 0.3s}.tab.active{background:#3498db;color:#fff;border-color:#3498db}.sw{text-align:center;position:relative;display:inline-block;width:100%;max-width:400px;margin:0 auto;left:0;transform:none}#inp,#div-inp{width:100%;padding:12px;background:#fff;color:#333;border:2px solid #d5dbdb;border-radius:6px;font-size:16px}#drop,#div-drop{background:#fff;border:2px solid #d5dbdb;border-radius:6px;position:absolute;width:100%;z-index:100;top:50px;left:0;max-height:200px;overflow-y:auto}.di{padding:12px;cursor:pointer;border-bottom:1px solid #ecf0f1;font-size:14px;color:#333}.di:hover{background:#ecf0f1}#cards,#hcards,#dcards{display:flex;flex-direction:column;gap:12px;margin-top:24px}.card,.hcard,.dcard{background:#fff;border:2px solid #d5dbdb;border-radius:10px;padding:16px;width:100%}.nm{font-size:28px;color:#000;font-weight:bold}.pr{font-size:28px;font-weight:bold}.up{color:#27ae60}.dn{color:#e74c3c}.vo{font-size:12px;color:#95a5a6;margin-top:4px}.jbuy{background:#27ae60;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold}.jneutral{background:#95a5a6;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px}.jwarn{background:#e74c3c;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold}.links{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}.lnk{background:#f5f5f5;border:1px solid #d5dbdb;color:#7f8c8d;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px;text-decoration:none}.lnk:hover{background:#ecf0f1;color:#333}.db{background:none;border:2px solid #d5dbdb;color:#e74c3c;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;margin-top:6px}.db:hover{background:#ffe6e1}.upd{text-align:center;color:#95a5a6;font-size:12px;margin-top:16px}#hold-form,#div-form{background:#fff;border:2px solid #d5dbdb;border-radius:10px;padding:16px;max-width:400px;margin:0 auto 20px}#hold-form input,#div-form input{width:100%;padding:8px;background:#fff;color:#333;border:2px solid #d5dbdb;border-radius:4px;font-size:14px;margin-bottom:8px}#hold-form button,#div-form button{width:100%;padding:10px;background:#3498db;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;font-weight:bold}#hold-form button:hover,#div-form button:hover{background:#2980b9}.section{display:none}.section.active{display:block}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:1000;justify-content:center;align-items:center}.modal.show{display:flex}.modal-box{background:#fff;border:2px solid #d5dbdb;border-radius:10px;padding:24px;width:90%;max-width:400px}.modal-box h3{margin:0 0 16px;color:#3498db}.modal-box input{width:100%;padding:8px;background:#fff;color:#333;border:2px solid #d5dbdb;border-radius:4px;font-size:16px;margin-bottom:12px}.modal-btns{display:flex;gap:8px}.modal-btns button{flex:1;padding:10px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold}.btn-ok{background:#27ae60;color:#fff}.btn-ok:hover{background:#229954}.btn-cancel{background:#d5dbdb;color:#333}.btn-cancel:hover{background:#bdc3c7}.yield-display{display:flex;gap:16px;margin:8px 0;font-size:13px}.yield-item{flex:1}.yield-label{color:#95a5a6;font-size:11px}.yield-value{color:#e74c3c;font-weight:bold;font-size:16px}</style></head><body><h1>KABUKAN</h1><div class="tabs"><div class="tab active" onclick="showTab('watch')">監視銘柄</div><div class="tab" onclick="showTab('hold')">保有株</div><div class="tab" onclick="showTab('dividend')">配当</div></div><div id="watch" class="section active"><div class="sw"><input id="inp" placeholder="銘柄名を入力" oninput="doSearch(this.value)"><div id="drop"></div></div><div id="cards"></div><div class="upd" id="upd"></div></div><div id="hold" class="section"><div id="hold-form"><input id="hname" placeholder="銘柄名"><input id="hcode" placeholder="銘柄コード (例: 7203)"><input id="hprice" placeholder="取得単価 (円)" type="number"><button onclick="addHold()">追加</button></div><div id="hcards"></div></div><div id="dividend" class="section"><div id="div-form"><input id="div-name" placeholder="銘柄名"><input id="div-code" placeholder="銘柄コード (例: 2914)"><input id="div-dividend" placeholder="年間配当金 (円)" type="number"><input id="div-price" placeholder="購入単価 (円)" type="number"><button onclick="addDividend()">追加</button></div><div id="dcards"></div></div><div class="modal" id="editModal"><div class="modal-box"><h3>取得単価を修正</h3><input type="number" id="editPrice" placeholder="新しい取得単価"><div class="modal-btns"><button class="btn-ok" onclick="saveEdit()">保存</button><button class="btn-cancel" onclick="closeEdit()">キャンセル</button></div></div></div><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script>const B='https://kabukan.onrender.com';let C=[],H=JSON.parse(localStorage.getItem('holds')||'[]'),D=JSON.parse(localStorage.getItem('dividends')||'[]'),editIdx=-1;async function loadStocks(){const r=await fetch(B+'/get-stocks');const j=await r.json();C=j.stocks||[];load()}async function loadDividends(){const r=await fetch(B+'/get-dividends');const j=await r.json();D=j.dividends||[];localStorage.setItem('dividends',JSON.stringify(D));renderDividends()}function showTab(t){localStorage.setItem('activeTab',t);document.querySelectorAll('.tab').forEach((x,i)=>{x.classList.toggle('active',['watch','hold','dividend'][i]===t)});document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));document.getElementById(t).classList.add('active');if(t==='hold')renderHolds();if(t==='dividend')loadDividends()}function openEdit(i){editIdx=i;document.getElementById('editPrice').value=H[i].price;document.getElementById('editModal').classList.add('show')}function closeEdit(){document.getElementById('editModal').classList.remove('show');editIdx=-1}function saveEdit(){const p=parseFloat(document.getElementById('editPrice').value);if(!isNaN(p)&&p>0){H[editIdx].price=p;localStorage.setItem('holds',JSON.stringify(H));renderHolds()}closeEdit()}async function doSearch(q){const d=document.getElementById('drop');if(q.length<1){d.innerHTML='';return}try{const r=await fetch(B+'/search?q='+encodeURIComponent(q));const j=await r.json();d.innerHTML=j.results.length?j.results.map(x=>'<div class="di" onmousedown="pick(\''+x.code+'\',\''+x.name+'\')">'+x.name+' ('+x.code+')</div>').join(''):'<div class="di" style="color:#95a5a6">見つかりません</div>'}catch(e){d.innerHTML='<div class="di" style="color:#e74c3c">未接続</div>'}}async function pick(code,name){document.getElementById('drop').innerHTML='';document.getElementById('inp').value='';if(!C.find(x=>x.code==code)){try{await fetch(B+'/add-stock?code='+code+'&name='+encodeURIComponent(name),{method:'POST'});C.push({code,name});load()}catch(e){alert('追加に失敗しました')}}}async function del(code){try{await fetch(B+'/delete-stock?code='+code,{method:'DELETE'});C=C.filter(x=>x.code!=code);load()}catch(e){alert('削除に失敗しました')}}function kabutan(code){window.open('https://kabutan.jp/stock/?code='+code,'_blank')}function ir(code){window.open('https://www.nikkei.com/nkd/company/?scode='+code,'_blank')}function shinyo(code){window.open('https://nikkeiyosoku.com/stock/margin/'+code+'/','_blank')}function jclass(j){return j==='買い候補'?'jbuy':j==='警戒'?'jwarn':'jneutral'}async function load(){const el=document.getElementById('cards');if(!C.length){el.innerHTML='<p style="color:#95a5a6;text-align:center;width:100%">銘柄を検索して追加してください</p>';return}try{const r=await fetch(B+'/quotes?codes='+C.map(x=>x.code).join(','));const j=await r.json();el.innerHTML=j.quotes.map(q=>{if(q.error)return'<div class="card"><div class="nm">'+q.code+'</div><div style="color:#e74c3c">エラー</div><button class="db" onclick="del(\''+q.code+'\')">削除</button></div>';const up=q.change>=0;const s=up?'+':'';const dv=q.deviation!=null?(q.deviation>=0?'+':'')+q.deviation+'%':'--';return'<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div class="nm">'+(q.name||q.code)+'</div><span class="'+jclass(q.judgment)+'">'+q.judgment+'</span></div><div class="pr '+(up?'up':'dn')+'">'+q.price.toLocaleString()+'円</div><div class="'+(up?'up':'dn')+'">'+s+q.change+'円 ('+s+q.changePct+'%)</div><div class="vo">出来高: '+q.volume.toLocaleString()+'</div><div class="vo">乖離率: '+dv+'</div><canvas id="vol_'+q.code+'" height="80"></canvas><div class="links"><a class="lnk" onclick="kabutan(\''+q.code+'\')">信用倍率</a><a class="lnk" onclick="shinyo(\''+q.code+'\')">買残・売残</a><a class="lnk" onclick="ir(\''+q.code+'\')">日経IR</a></div><button class="db" onclick="del(\''+q.code+'\')">削除</button></div>'}).join('');document.getElementById('upd').textContent='更新: '+new Date().toLocaleTimeString();j.quotes.forEach(async(q)=>{if(q.error)return;const cv=document.getElementById('vol_'+q.code);if(!cv)return;try{const hr=await fetch(B+'/history/'+q.code);const hj=await hr.json();new Chart(cv,{type:'bar',data:{labels:hj.dates,datasets:[{data:hj.volumes,backgroundColor:'#3498db'}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:5,color:'#7f8c8d'},grid:{display:false}},y:{ticks:{color:'#7f8c8d'},grid:{color:'#ecf0f1'}}},animation:false}})}catch(e){}})}catch(e){document.getElementById('upd').textContent='未接続'}}function addHold(){const name=document.getElementById('hname').value.trim();const code=document.getElementById('hcode').value.trim().replace(/[！-～]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xFEE0));const price=parseFloat(document.getElementById('hprice').value);if(!name||!code||!price)return;H.push({name,code,price});localStorage.setItem('holds',JSON.stringify(H));document.getElementById('hname').value='';document.getElementById('hcode').value='';document.getElementById('hprice').value='';renderHolds()}async function renderHolds(){const el=document.getElementById('hcards');if(!H.length){el.innerHTML='<p style="color:#95a5a6;text-align:center;width:100%">保有株を追加してください</p>';return}try{const r=await fetch(B+'/quotes?codes='+H.map(x=>x.code).join(','));const j=await r.json();const rows=await Promise.all(j.quotes.map(async(q,i)=>{const h=H[i];const cur=q.price||0;const pct=((cur-h.price)/h.price*100).toFixed(2);const up=cur>=h.price;const tgt=Math.round(h.price*1.25);const stp=Math.round(h.price*0.80);const cid='chart_'+i;return'<div class="hcard"><div class="nm">'+h.name+'('+h.code+')</div><div class="ht '+(up?'up':'dn')+'">'+cur.toLocaleString()+'円</div><div class="'+(up?'up':'dn')+'">'+(up?'+':'')+pct+'%</div><div class="hm">取得単価: '+h.price.toLocaleString()+'円</div><div class="hm" style="color:#27ae60">利確目安: '+tgt.toLocaleString()+'円</div><div class="hm" style="color:#e74c3c">損切目安: '+stp.toLocaleString()+'円</div><canvas id="'+cid+'" height="120"></canvas><div style="display:flex;gap:4px;margin-top:8px"><button onclick="openEdit('+i+')" style="background:none;border:2px solid #27ae60;color:#27ae60;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px">編集</button><button class="db" onclick="delHold('+i+')">削除</button></div></div>';}));el.innerHTML=rows.join('');j.quotes.forEach(async(q,i)=>{const h=H[i];const cid='chart_'+i;const cv=document.getElementById(cid);if(!cv)return;try{const hr=await fetch(B+'/history/'+h.code);const hj=await hr.json();const labels=hj.dates;const data=hj.prices.map(p=>parseFloat(((p-h.price)/h.price*100).toFixed(2)));new Chart(cv,{type:'line',data:{labels,datasets:[{data,borderColor:'#27ae60',backgroundColor:'rgba(39,174,96,0.1)',borderWidth:1.5,pointRadius:0,tension:0.3},{data:Array(data.length).fill(0),borderColor:'#bdc3c7',borderWidth:1,borderDash:[4,4],pointRadius:0}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:5,color:'#7f8c8d'},grid:{color:'#ecf0f1'}},y:{ticks:{color:'#7f8c8d',callback:v=>v+'%'},grid:{color:'#ecf0f1'}}},animation:false}})}catch(e){}})}catch(e){el.innerHTML='<p style="color:#e74c3c">エラー</p>'}}function delHold(i){H.splice(i,1);localStorage.setItem('holds',JSON.stringify(H));renderHolds()}async function addDividend(){const name=document.getElementById('div-name').value.trim();const code=document.getElementById('div-code').value.trim().replace(/[！-～]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xFEE0));const dividend=parseFloat(document.getElementById('div-dividend').value);const price=parseFloat(document.getElementById('div-price').value);if(!name||!code||!dividend||!price)return;try{await fetch(B+'/add-dividend?code='+code+'&name='+encodeURIComponent(name)+'&annual_dividend='+dividend+'&purchase_price='+price,{method:'POST'});D.push({code,name,annual_dividend:dividend,purchase_price:price});localStorage.setItem('dividends',JSON.stringify(D));document.getElementById('div-name').value='';document.getElementById('div-code').value='';document.getElementById('div-dividend').value='';document.getElementById('div-price').value='';renderDividends()}catch(e){alert('追加に失敗しました')}}async function delDividend(code){try{await fetch(B+'/delete-dividend?code='+code,{method:'DELETE'});D=D.filter(x=>x.code!=code);localStorage.setItem('dividends',JSON.stringify(D));renderDividends()}catch(e){alert('削除に失敗しました')}}async function renderDividends(){const el=document.getElementById('dcards');if(!D.length){el.innerHTML='<p style="color:#95a5a6;text-align:center;width:100%">配当銘柄を追加してください</p>';return}try{const r=await fetch(B+'/quotes?codes='+D.map(x=>x.code).join(','));const j=await r.json();const rows=await Promise.all(j.quotes.map(async(q,i)=>{const d=D[i];const price=q.price||0;const currentYield=price>0?((d.annual_dividend/price)*100).toFixed(2):0;const purchaseYield=d.purchase_price>0?((d.annual_dividend/d.purchase_price)*100).toFixed(2):null;const cid='div_chart_'+i;return'<div class="dcard"><div class="nm">'+d.name+'('+d.code+')</div><div class="yield-display"><div class="yield-item"><div class="yield-label">現在利回り</div><div class="yield-value">'+currentYield+'%</div></div>'+(purchaseYield?'<div class="yield-item"><div class="yield-label">購入時利回り</div><div class="yield-value">'+purchaseYield+'%</div></div>':'')+'</div><div class="vo">現在株価: '+price.toLocaleString()+'円</div><div class="vo">購入単価: '+d.purchase_price.toLocaleString()+'円</div><div class="vo">年間配当金: '+d.annual_dividend+'円</div><canvas id="'+cid+'" height="150"></canvas><button class="db" onclick="delDividend(\''+q.code+'\')">削除</button></div>';}));el.innerHTML=rows.join('');j.quotes.forEach(async(q,i)=>{const d=D[i];const cid='div_chart_'+i;const cv=document.getElementById(cid);if(!cv)return;try{const dr=await fetch(B+'/dividend-yield/'+d.code);const dj=await dr.json();if(dj.error)return;const labels=dj.dates;const yields=dj.yields;new Chart(cv,{type:'line',data:{labels,datasets:[{label:'利回り',data:yields,borderColor:'#e74c3c',backgroundColor:'rgba(231,76,60,0.1)',borderWidth:2,pointRadius:0,tension:0.3},{label:'5%',data:Array(yields.length).fill(5),borderColor:'#bdc3c7',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false},{label:'5.5%',data:Array(yields.length).fill(5.5),borderColor:'#f39c12',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false},{label:'6%',data:Array(yields.length).fill(6),borderColor:'#e74c3c',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false}]},options:{plugins:{legend:{display:true,labels:{color:'#7f8c8d',font:{size:10}}}},scales:{x:{ticks:{maxTicksLimit:5,color:'#7f8c8d'},grid:{color:'#ecf0f1'}},y:{ticks:{color:'#7f8c8d',callback:v=>v+'%'},grid:{color:'#ecf0f1'}}},animation:false}})}catch(e){}})}catch(e){el.innerHTML='<p style="color:#e74c3c">エラー</p>'}}loadStocks();const savedTab=localStorage.getItem('activeTab');if(savedTab && savedTab!=='watch'){showTab(savedTab);}</script></body></html>
