<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>KABUKAN</title><style>*{box-sizing:border-box}body{background:#111;color:#eee;font-family:sans-serif;padding:20px;margin:0}h1{color:#0f0;text-align:center;margin-bottom:10px}.tabs{display:flex;justify-content:center;gap:8px;margin-bottom:20px}.tab{padding:8px 20px;background:#222;border:1px solid #444;border-radius:6px;cursor:pointer;font-size:14px}.tab.active{background:#0f0;color:#000;border-color:#0f0}.sw{text-align:center;position:relative;display:inline-block;width:300px;left:50%;transform:translateX(-50%)}#inp{width:100%;padding:10px;background:#222;color:#fff;border:1px solid #555;border-radius:6px;font-size:16px}#drop{background:#222;border:1px solid #444;border-radius:6px;position:absolute;width:100%;z-index:100;top:44px;left:0}.di{padding:12px;cursor:pointer;border-bottom:1px solid #333;font-size:14px}.di:hover{background:#333}#cards{display:flex;flex-wrap:wrap;margin-top:24px;gap:12px}.card{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:16px;min-width:220px;flex:1}.nm{font-size:13px;color:#888}.pr{font-size:28px;font-weight:bold}.up{color:#0f0}.dn{color:#f44}.vo{font-size:12px;color:#555;margin-top:4px}.jbuy{background:#0f0;color:#000;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold}.jneutral{background:#888;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px}.jwarn{background:#f44;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold}.links{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}.lnk{background:#222;border:1px solid #444;color:#aaa;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px;text-decoration:none}.lnk:hover{background:#333;color:#fff}.db{background:none;border:1px solid #f44;color:#f44;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;margin-top:6px}.eb{background:none;border:1px solid #0f0;color:#0f0;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;margin-top:6px;margin-right:4px}.upd{text-align:center;color:#444;font-size:12px;margin-top:16px}#hold-form{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:16px;max-width:400px;margin:0 auto 20px}#hold-form input{width:100%;padding:8px;background:#222;color:#fff;border:1px solid #555;border-radius:4px;font-size:14px;margin-bottom:8px}#hold-form button{width:100%;padding:10px;background:#0f0;color:#000;border:none;border-radius:6px;font-size:16px;cursor:pointer;font-weight:bold}#hcards{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}.hcard{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:16px;min-width:220px;flex:1}.ht{font-size:18px;font-weight:bold}.hm{font-size:13px;color:#888;margin-top:4px}.section{display:none}.section.active{display:block}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;justify-content:center;align-items:center}.modal.show{display:flex}.modal-box{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:24px;width:90%;max-width:400px}.modal-box h3{margin:0 0 16px;color:#0f0}.modal-box input{width:100%;padding:8px;background:#222;color:#fff;border:1px solid #555;border-radius:4px;font-size:16px;margin-bottom:12px}.modal-btns{display:flex;gap:8px}.modal-btns button{flex:1;padding:10px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold}.btn-ok{background:#0f0;color:#000}.btn-cancel{background:#333;color:#eee}</style></head><body><h1>KABUKAN</h1><div class="tabs"><div class="tab active" onclick="showTab('watch')">監視銘柄</div><div class="tab" onclick="showTab('hold')">保有株</div></div><div id="watch" class="section active"><div class="sw"><input id="inp" placeholder="銘柄名を入力" oninput="doSearch(this.value)"><div id="drop"></div></div><div id="cards"></div><div class="upd" id="upd"></div></div><div id="hold" class="section"><div id="hold-form"><input id="hname" placeholder="銘柄名"><input id="hcode" placeholder="銘柄コード (例: 7203)"><input id="hprice" placeholder="取得単価 (円)" type="number"><button onclick="addHold()">追加</button></div><div id="hcards"></div></div><div class="modal" id="editModal"><div class="modal-box"><h3>取得単価を修正</h3><input type="number" id="editPrice" placeholder="新しい取得単価"><div class="modal-btns"><button class="btn-ok" onclick="saveEdit()">保存</button><button class="btn-cancel" onclick="closeEdit()">キャンセル</button></div></div></div><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script>const B='https://kabukan.onrender.com';let C=[],H=JSON.parse(localStorage.getItem('holds')||'[]'),editIdx=-1;function showTab(t){document.querySelectorAll('.tab').forEach((x,i)=>{x.classList.toggle('active',['watch','hold'][i]===t)});document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));document.getElementById(t).classList.add('active');if(t==='hold')renderHolds()}function openEdit(i){editIdx=i;document.getElementById('editPrice').value=H[i].price;document.getElementById('editModal').classList.add('show')}function closeEdit(){document.getElementById('editModal').classList.remove('show');editIdx=-1}function saveEdit(){const p=parseFloat(document.getElementById('editPrice').value);if(!isNaN(p)&&p>0){H[editIdx].price=p;localStorage.setItem('holds',JSON.stringify(H));renderHolds()}closeEdit()}async function doSearch(q){const d=document.getElementById('drop');if(q.length<1){d.innerHTML='';return}try{const r=await fetch(B+'/search?q='+encodeURIComponent(q));const j=await r.json();d.innerHTML=j.results.length?j.results.map(x=>'<div class="di" onmousedown="pick(\''+x.code+'\',\''+x.name+'\')">'+x.name+' ('+x.code+')</div>').join(''):'<div class="di" style="color:#555">見つかりません</div>'}catch(e){d.innerHTML='<div class="di" style="color:#f44">未接続</div>'}}function pick(code,name){document.getElementById('drop').innerHTML='';document.getElementById('inp').value='';if(!C.find(x=>x.code==code)){C.push({code,name});load()}}function del(code){C=C.filter(x=>x.code!=code);load()}function kabutan(code){window.open('https://kabutan.jp/stock/?code='+code,'_blank')}function ir(code){window.open('https://www.nikkei.com/nkd/company/?scode='+code,'_blank')}function shinyo(code){window.open('https://nikkeiyosoku.com/stock/margin/'+code+'/','_blank')}function jclass(j){return j==='買い候補'?'jbuy':j==='警戒'?'jwarn':'jneutral'}async function load(){const el=document.getElementById('cards');if(!C.length){el.innerHTML='<p style="color:#555;text-align:center;width:100%">銘柄を検索して追加してください</p>';return}try{const r=await fetch(B+'/quotes?codes='+C.map(x=>x.code).join(','));const j=await r.json();el.innerHTML=j.quotes.map(q=>{if(q.error)return'<div class="card"><div class="nm">'+q.code+'</div><div style="color:#f44">エラー</div><button class="db" onclick="del(\''+q.code+'\')">削除</button></div>';const up=q.change>=0;const s=up?'+':'';const dv=q.deviation!=null?(q.deviation>=0?'+':'')+q.deviation+'%':'--';return'<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div class="nm">'+(q.name||q.code)+'</div><span class="'+jclass(q.judgment)+'">'+q.judgment+'</span></div><div class="pr '+(up?'up':'dn')+'">'+q.price.toLocaleString()+'円</div><div class="'+(up?'up':'dn')+'">'+s+q.change+'円 ('+s+q.changePct+'%)</div><div class="vo">出来高: '+q.volume.toLocaleString()+'</div><div class="vo">乖離率: '+dv+'</div><div class="links"><a class="lnk" onclick="kabutan(\''+q.code+'\')">株探</a><a class="lnk" onclick="shinyo(\''+q.code+'\')">信用情報</a><a class="lnk" onclick="ir(\''+q.code+'\')">日経IR</a></div><button class="db" onclick="del(\''+q.code+'\')">削除</button></div>'}).join('');document.getElementById('upd').textContent='更新: '+new Date().toLocaleTimeString()}catch(e){document.getElementById('upd').textContent='未接続'}}function addHold(){const name=document.getElementById('hname').value.trim();const code=document.getElementById('hcode').value.trim().replace(/[！-～]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xFEE0));const price=parseFloat(document.getElementById('hprice').value);if(!name||!code||!price)return;H.push({name,code,price});localStorage.setItem('holds',JSON.stringify(H));document.getElementById('hname').value='';document.getElementById('hcode').value='';document.getElementById('hprice').value='';renderHolds()}async function renderHolds(){const el=document.getElementById('hcards');if(!H.length){el.innerHTML='<p style="color:#555;text-align:center;width:100%">保有株を追加してください</p>';return}try{const r=await fetch(B+'/quotes?codes='+H.map(x=>x.code).join(','));const j=await r.json();const rows=await Promise.all(j.quotes.map(async(q,i)=>{const h=H[i];const cur=q.price||0;const pct=((cur-h.price)/h.price*100).toFixed(2);const up=cur>=h.price;const tgt=Math.round(h.price*1.25);const stp=Math.round(h.price*0.80);const cid='chart_'+i;return'<div class="hcard"><div class="nm">'+h.name+'('+h.code+')</div><div class="ht '+(up?'up':'dn')+'">'+cur.toLocaleString()+'円</div><div class="'+(up?'up':'dn')+'">'+(up?'+':'')+pct+'%</div><div class="hm">取得単価: '+h.price.toLocaleString()+'円</div><div class="hm" style="color:#0f0">利確目安: '+tgt.toLocaleString()+'円</div><div class="hm" style="color:#f44">損切目安: '+stp.toLocaleString()+'円</div><canvas id="'+cid+'" height="120"></canvas><div style="display:flex;gap:4px;margin-top:8px"><button class="eb" onclick="openEdit('+i+')">編集</button><button class="db" onclick="delHold('+i+')">削除</button></div></div>';}));el.innerHTML=rows.join('');j.quotes.forEach(async(q,i)=>{const h=H[i];const cid='chart_'+i;const cv=document.getElementById(cid);if(!cv)return;try{const hr=await fetch(B+'/history/'+h.code);const hj=await hr.json();const labels=hj.dates;const data=hj.prices.map(p=>parseFloat(((p-h.price)/h.price*100).toFixed(2)));new Chart(cv,{type:'line',data:{labels,datasets:[{data,borderColor:'#0f0',backgroundColor:'rgba(0,255,0,0.05)',borderWidth:1.5,pointRadius:0,tension:0.3},{data:Array(data.length).fill(0),borderColor:'#555',borderWidth:1,borderDash:[4,4],pointRadius:0}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:5,color:'#555'},grid:{color:'#222'}},y:{ticks:{color:'#555',callback:v=>v+'%'},grid:{color:'#222'}}},animation:false}})}catch(e){}})}catch(e){el.innerHTML='<p style="color:#f44">エラー</p>'}}function delHold(i){H.splice(i,1);localStorage.setItem('holds',JSON.stringify(H));renderHolds()}load();setInterval(load,30000);</script></body></html>
